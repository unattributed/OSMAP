name: codeql-advanced

on:
  workflow_dispatch:
    inputs:
      confirm_default_setup_disabled:
        description: >-
          Set to true only after GitHub default CodeQL setup has been disabled
          for this repository.
        required: true
        type: boolean

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  codeql:
    name: codeql / rust
    if: ${{ inputs.confirm_default_setup_disabled == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: initialize codeql
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          build-mode: none
          queries: security-extended

      - name: analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:rust"
