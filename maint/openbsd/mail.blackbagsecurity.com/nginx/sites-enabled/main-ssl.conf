# HTTPS vhosts for mail.blackbagsecurity.com
# nginx chroot: /var/www
#
# Public WAN exposure is intentionally limited to OSMAP at the canonical
# browser root. Existing private/control applications remain available only
# through the loopback and WireGuard listeners below.

server {
    listen 192.168.1.44:443 ssl;
    http2 on;

    server_name mail.blackbagsecurity.com;

    # Default root for this vhost (inside chroot /var/www)
    # /htdocs is /var/www/htdocs on the real filesystem
    root /htdocs;
    index index.php index.html;

    # TLS, misc hardening, and OSMAP public browser route
    include /etc/nginx/templates/ssl.tmpl;
    include /etc/nginx/templates/osmap-root.tmpl;

    # General logs for this vhost
    access_log /var/log/nginx/mail.access.log;
    error_log  /var/log/nginx/mail.error.log;
}

server {
    listen 127.0.0.1:443 ssl;
    listen 10.44.0.1:443 ssl;
    http2 on;

    server_name mail.blackbagsecurity.com 10.44.0.1 127.0.0.1;

    # Default root for this vhost (inside chroot /var/www)
    # /htdocs is /var/www/htdocs on the real filesystem
    root /htdocs;
    index index.php index.html;

    # Serve outbound-brand assets such as BIMI SVGs or mark certificates from
    # a stable HTTPS path on the private/control listener.
    location ^~ /.well-known/bimi/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300";
    }

    # TLS, misc hardening, OSMAP, and private/control application templates
    include /etc/nginx/templates/ssl.tmpl;
    include /etc/nginx/templates/misc.tmpl;
    include /etc/nginx/templates/osmap-root.tmpl;
    include /etc/nginx/templates/sogo.tmpl;
    include /etc/nginx/templates/postfixadmin.tmpl;
    include /etc/nginx/templates/php-catchall.tmpl;
    include /etc/nginx/templates/stub_status.tmpl;
    include /etc/nginx/templates/pf_dashboard.locations.tmpl;
    include /etc/nginx/templates/ops_monitor.locations.tmpl;
    include /etc/nginx/templates/obsd1_dr_portal.locations.tmpl;
    include /etc/nginx/templates/rspamd.tmpl;
    include /etc/nginx/templates/brevo_webhook.locations.tmpl;

    # General logs for this vhost
    access_log /var/log/nginx/mail.access.log;
    error_log  /var/log/nginx/mail.error.log;
}
